<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ritual | Crear Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../includes/style.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Ritual</h1>
        </div>
        <nav>
            <a href="../index.php">Inicio</a>
            <a href="productos.html">Catálogo</a>
            <a href="../usuarios/logout.php">Salir</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h2>Crear Producto</h2>
            <p>Sumá un nuevo producto a Ritual</p>
        </div>

        <div class="row">
            <div class="col-md-3"></div>
            <div class="col-md-6">
                <form action="guardarProducto.php" method="post" class="form-ritual">

                    <label for="nombre">Nombre</label>
                    <input type="text" name="nombre" required>

                    <label for="descripcion">Descripción</label>
                    <input type="text" name="descripcion" required>

                    <label for="precio">Precio</label>
                    <input type="number" name="precio" step="0.01" required>

                    <label for="stock">Stock</label>
                    <input type="number" name="stock" required>

                    <label for="marca">Marca</label>
                    <input type="text" name="marca" required>

                    <label for="foto">Foto (ruta)</label>
                    <input type="text" name="foto" placeholder="images/producto.jpg" required>

                    <label for="id_categoria">Categoría</label>
                    <select name="id_categoria" required>
                        <option value="1">MakeUp</option>
                        <option value="2">Corporal</option>
                        <option value="3">Capilar</option>
                        <option value="4">Skincare</option>
                        <option value="5">Set Ritual</option>
                    </select>

                    <button type="submit" class="btn-dark">Guardar producto</button>
                </form>
            </div>
            <div class="col-md-3"></div>
        </div>
    </main>

    <footer>
        <p class="footer-brand">Ritual · Beauty & Self Care</p>
        <p class="footer-info">ISEC | PP Programación II | 2026</p>
    </footer>

</body>
</html>
